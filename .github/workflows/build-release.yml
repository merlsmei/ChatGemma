name: Build & Release APK

on:
  push:
    branches:
      - "claude/android-gemma-chat-app-j6GOG"
      - "claude/model-download-progress-bar-Jlhq4"
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Cache llama.cpp Android libraries
        id: llama-cache
        uses: actions/cache@v4
        with:
          path: |
            app/src/main/jniLibs/arm64-v8a
            app/src/main/cpp/llama_include
          key: llama-cpp-android-arm64-v1-${{ hashFiles('app/src/main/cpp/llama_jni.cpp') }}

      - name: Build llama.cpp for Android (arm64-v8a)
        if: steps.llama-cache.outputs.cache-hit != 'true'
        run: |
          set -e

          # ── Find Android NDK ───────────────────────────────────────────────
          NDK_ROOT="${ANDROID_NDK_ROOT:-${ANDROID_NDK_HOME:-}}"
          if [ -z "$NDK_ROOT" ]; then
            NDK_ROOT=$(ls -d "${ANDROID_HOME:-/usr/local/lib/android/sdk}/ndk/"*/ 2>/dev/null \
              | sort -rV | head -1 | sed 's|/$||')
          fi
          echo "NDK: $NDK_ROOT"
          [ -d "$NDK_ROOT" ] || { echo "ERROR: Android NDK not found"; exit 1; }

          # ── Clone llama.cpp (latest HEAD, shallow) ─────────────────────────
          git clone --depth=1 https://github.com/ggerganov/llama.cpp.git llama_src
          echo "llama.cpp HEAD: $(git -C llama_src rev-parse --short HEAD)"

          # ── CMake configure (CPU-only, shared lib, no tests/examples) ───────
          cmake \
            -S llama_src -B llama_build \
            -DCMAKE_TOOLCHAIN_FILE="$NDK_ROOT/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DGGML_METAL=OFF \
            -DGGML_CUDA=OFF \
            -DGGML_VULKAN=OFF \
            -DGGML_OPENMP=OFF

          # ── Build ──────────────────────────────────────────────────────────
          cmake --build llama_build -j$(nproc)

          # ── Copy .so files ─────────────────────────────────────────────────
          mkdir -p app/src/main/jniLibs/arm64-v8a
          find llama_build -name "*.so" \
            -exec cp {} app/src/main/jniLibs/arm64-v8a/ \;
          echo "Shared libraries:"
          ls -lh app/src/main/jniLibs/arm64-v8a/

          # ── Copy headers ───────────────────────────────────────────────────
          # Modern llama.cpp splits headers across include/ and ggml/include/;
          # copy all *.h from every public include location so transitive
          # dependencies like ggml-cpu.h, ggml-alloc.h, ggml-backend.h, etc.
          # are available when compiling llama_jni.cpp.
          mkdir -p app/src/main/cpp/llama_include
          # Root-level headers (older layout)
          find llama_src -maxdepth 1 -name "*.h" \
            -exec cp {} app/src/main/cpp/llama_include/ \; 2>/dev/null || true
          # include/ subdir (newer layout: llama.h lives here)
          find llama_src/include -name "*.h" \
            -exec cp {} app/src/main/cpp/llama_include/ \; 2>/dev/null || true
          # ggml/include/ (ggml.h, ggml-cpu.h, ggml-alloc.h, ggml-backend.h, …)
          find llama_src/ggml/include -name "*.h" \
            -exec cp {} app/src/main/cpp/llama_include/ \; 2>/dev/null || true
          echo "Headers copied:"
          ls -lh app/src/main/cpp/llama_include/

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatGemma-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "ChatGemma Build #${{ github.run_number }} (${{ steps.sha.outputs.short }})"
          body: |
            ## ChatGemma — Automated Build

            **Build:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}

            ### Installation
            1. Download `app-debug.apk` below
            2. On your Android device, go to **Settings → Security → Install unknown apps** and allow your browser/file manager
            3. Open the APK file and install
            4. On first launch, go to **Model Manager** and download a Gemma model to start chatting

            ### First-Time Setup
            - Requires Android 8.0 (API 26) or higher
            - Recommended: 12 GB RAM device; Mobile Ready badge shown for ≤10 GB models
            - Supports **GGUF** (llama.cpp) and **.task** (MediaPipe) model formats
            - Model files are **not bundled** — download via the in-app Model Manager

            ### Features
            - On-device Gemma 4 multimodal chat (text, voice, image, video)
            - Session management with branching & rollback
            - Context management: topic compression, summarization, archiving
            - Weekly HuggingFace model update tracking
            - ChatGPT-style UI with dark/light theme
          files: app/build/outputs/apk/debug/app-debug.apk
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
