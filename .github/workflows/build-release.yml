name: Build & Release APK

on:
  push:
    branches:
      - "claude/android-gemma-chat-app-j6GOG"
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Download llama.cpp Android libraries
        run: |
          set -e

          # ── 1. Resolve latest llama.cpp release tag ─────────────────────────
          PINNED_TAG="b5572"   # fallback if API call fails
          API_JSON=$(curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/ggerganov/llama.cpp/releases/latest" 2>/dev/null || echo "{}")
          TAG=$(echo "$API_JSON" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d['tag_name'])" 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            echo "Warning: GitHub API did not return a tag — using pinned fallback $PINNED_TAG"
            TAG="$PINNED_TAG"
          fi
          echo "llama.cpp release: $TAG"

          # ── 2. Download pre-built Android zip ──────────────────────────────
          BASE_DL="https://github.com/ggerganov/llama.cpp/releases/download/${TAG}"
          downloaded=false
          for name in \
            "llama-${TAG}-android.zip" \
            "llama-${TAG}-bin-android.zip" \
            "llama-${TAG}-bin-ubuntu-x64.zip"; do
            echo "Trying: ${BASE_DL}/${name}"
            if curl -fsSL -o llama-android.zip "${BASE_DL}/${name}"; then
              downloaded=true
              break
            fi
          done
          if [ "$downloaded" = false ]; then
            echo "ERROR: Could not download llama.cpp Android binaries."
            exit 1
          fi

          # ── 3. Extract arm64-v8a .so files ──────────────────────────────────
          mkdir -p app/src/main/jniLibs/arm64-v8a
          unzip -q llama-android.zip -d llama-android
          find llama-android -name "*.so" -path "*/arm64-v8a/*" \
            -exec cp {} app/src/main/jniLibs/arm64-v8a/ \;
          echo "Shared libraries:"
          ls -lh app/src/main/jniLibs/arm64-v8a/

          # ── 4. Download headers ─────────────────────────────────────────────
          mkdir -p app/src/main/cpp/llama_include
          BASE_RAW="https://raw.githubusercontent.com/ggerganov/llama.cpp/${TAG}"
          # llama.h: try include/ first (post-refactor layout), then root
          curl -fsSL "${BASE_RAW}/include/llama.h" \
            -o app/src/main/cpp/llama_include/llama.h 2>/dev/null || \
          curl -fsSL "${BASE_RAW}/llama.h" \
            -o app/src/main/cpp/llama_include/llama.h
          # ggml.h: needed by some llama.h versions
          curl -fsSL "${BASE_RAW}/ggml/include/ggml.h" \
            -o app/src/main/cpp/llama_include/ggml.h 2>/dev/null || \
          curl -fsSL "${BASE_RAW}/ggml.h" \
            -o app/src/main/cpp/llama_include/ggml.h 2>/dev/null || true
          echo "Headers:"
          ls -lh app/src/main/cpp/llama_include/

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatGemma-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "ChatGemma Build #${{ github.run_number }} (${{ steps.sha.outputs.short }})"
          body: |
            ## ChatGemma — Automated Build

            **Build:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}

            ### Installation
            1. Download `app-debug.apk` below
            2. On your Android device, go to **Settings → Security → Install unknown apps** and allow your browser/file manager
            3. Open the APK file and install
            4. On first launch, go to **Model Manager** and download a Gemma model to start chatting

            ### First-Time Setup
            - Requires Android 8.0 (API 26) or higher
            - Recommended: 12 GB RAM device; Mobile Ready badge shown for ≤10 GB models
            - Supports **GGUF** (llama.cpp) and **.task** (MediaPipe) model formats
            - Model files are **not bundled** — download via the in-app Model Manager

            ### Features
            - On-device Gemma 4 multimodal chat (text, voice, image, video)
            - Session management with branching & rollback
            - Context management: topic compression, summarization, archiving
            - Weekly HuggingFace model update tracking
            - ChatGPT-style UI with dark/light theme
          files: app/build/outputs/apk/debug/app-debug.apk
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
