name: Build & Release APK

on:
  push:
    branches:
      - "claude/android-gemma-chat-app-j6GOG"
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Download llama.cpp Android libraries
        run: |
          # Resolve the latest llama.cpp release tag
          TAG=$(curl -sf "https://api.github.com/repos/ggerganov/llama.cpp/releases/latest" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "llama.cpp release: $TAG"

          # Download the pre-built Android zip
          ZIP_URL="https://github.com/ggerganov/llama.cpp/releases/download/${TAG}/llama-${TAG}-android.zip"
          if ! curl -fsSL -o llama-android.zip "$ZIP_URL"; then
            # Some releases use a different naming convention
            ZIP_URL="https://github.com/ggerganov/llama.cpp/releases/download/${TAG}/llama-${TAG}-bin-android.zip"
            curl -fsSL -o llama-android.zip "$ZIP_URL"
          fi

          # Extract arm64-v8a shared libraries
          mkdir -p app/src/main/jniLibs/arm64-v8a
          unzip -q llama-android.zip -d llama-android
          find llama-android -name "*.so" -path "*/arm64-v8a/*" \
            -exec cp {} app/src/main/jniLibs/arm64-v8a/ \;
          echo "Shared libraries:"
          ls -lh app/src/main/jniLibs/arm64-v8a/

          # Download llama.h (try include/ subdirectory first, then root)
          mkdir -p app/src/main/cpp/llama_include
          BASE_RAW="https://raw.githubusercontent.com/ggerganov/llama.cpp/${TAG}"
          curl -fsSL "${BASE_RAW}/include/llama.h" \
            -o app/src/main/cpp/llama_include/llama.h 2>/dev/null || \
          curl -fsSL "${BASE_RAW}/llama.h" \
            -o app/src/main/cpp/llama_include/llama.h
          # ggml.h (needed by some llama.h versions)
          curl -fsSL "${BASE_RAW}/ggml/include/ggml.h" \
            -o app/src/main/cpp/llama_include/ggml.h 2>/dev/null || \
          curl -fsSL "${BASE_RAW}/ggml.h" \
            -o app/src/main/cpp/llama_include/ggml.h 2>/dev/null || true
          echo "Headers:"
          ls -lh app/src/main/cpp/llama_include/

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatGemma-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "ChatGemma Build #${{ github.run_number }} (${{ steps.sha.outputs.short }})"
          body: |
            ## ChatGemma — Automated Build

            **Build:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}

            ### Installation
            1. Download `app-debug.apk` below
            2. On your Android device, go to **Settings → Security → Install unknown apps** and allow your browser/file manager
            3. Open the APK file and install
            4. On first launch, go to **Model Manager** and download a Gemma model to start chatting

            ### First-Time Setup
            - Requires Android 8.0 (API 26) or higher
            - Recommended: 12 GB RAM device; Mobile Ready badge shown for ≤10 GB models
            - Supports **GGUF** (llama.cpp) and **.task** (MediaPipe) model formats
            - Model files are **not bundled** — download via the in-app Model Manager

            ### Features
            - On-device Gemma 4 multimodal chat (text, voice, image, video)
            - Session management with branching & rollback
            - Context management: topic compression, summarization, archiving
            - Weekly HuggingFace model update tracking
            - ChatGPT-style UI with dark/light theme
          files: app/build/outputs/apk/debug/app-debug.apk
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
